<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Livello 6 - Terminale JavaScript</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .navbar { width: 100%; background-color: #161b22; border-bottom: 2px solid #30363d; padding: 15px 30px; display: flex; align-items: center; box-sizing: border-box; }
        .navbar-title { color: #2ea043; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(46, 160, 67, 0.3); margin: 0; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .level-header { color: #2ea043; font-size: 22px; font-weight: bold; margin-bottom: 15px; letter-spacing: 3px; }
        .box { border: 1px solid #30363d; padding: 40px 50px; text-align: center; background: #161b22; border-radius: 8px; width: 100%; max-width: 650px; box-sizing: border-box; }
        
        .terminal-box { background-color: #0d1117; border: 1px solid #30363d; padding: 15px; border-radius: 6px; text-align: left; font-family: monospace; color: #8b949e; margin: 25px 0; }
        .terminal-box span { color: #58a6ff; }
        .terminal-box b { color: #e3b341; }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 35px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; font-family: inherit; font-size: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-menu { border: 1px solid #58a6ff; color: #58a6ff; background: transparent; }
        .btn-hint { border: 1px solid #e3b341; color: #e3b341; background: transparent; }
        .btn-next { background-color: #2ea043; color: white; border: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar-title">INSPECT FURTHER</div>
    </div>

    <div class="content">
        <div class="level-header">// LIVELLO 6</div>
        <div class="box">
            <h2>Interfaccia a Riga di Comando</h2>
            <p>Le applicazioni web moderne espongono funzioni interne che possono essere invocate direttamente dall'interprete dei comandi.</p>
            
            <div class="terminal-box">
                $ <b>revealMyPasswordNowPlease()</b>
            </div>

            <p>Tu lo sai come si esegue <i>questo comando</i>?</p>
            
            <div class="btn-group">
                <a href="../index.html" class="btn btn-menu">Menu Principale</a>
                <button onclick="showHint(6)" class="btn btn-hint">💡 Suggerimento</button>
                <button onclick="checkNextLevelPassword(7, '../_level_7_1184g/index.html')" class="btn btn-next">Prossimo Livello ➡️</button>
            </div>
        </div>
    </div>

    <script>
        function revealMyPasswordNowPlease() {
            fetch('../passwords.txt')
                .then(response => response.text())
                .then(text => {
                    const match = text.match(/^lv7=(.*)$/m);
                    if (match && match[1]) {
                        console.log("%c───────────────────────────────────────────", "color: #30363d; font-weight: bold;");
                        console.log(`%c🔑 PASSWORD DI SBLOCCO: ${match[1].trim()}`, "color: #2ea043; font-size: 16px; font-weight: bold; font-family: monospace; text-shadow: 0 0 5px rgba(46,160,67,0.3);");
                        console.log("%c───────────────────────────────────────────", "color: #30363d; font-weight: bold;");
                    } else {
                        console.error("Errore: Impossibile trovare la chiave 'lv6' nel file delle password.");
                    }
                })
                .catch(() => {
                    console.error("Errore di rete: Impossibile recuperare il file passwords.txt.");
                });
            
            return "⏳ Interrogazione del server in corso... Controlla qui sotto:";
        }

        function showHint(num) {
            fetch('../hints.txt').then(r => r.text()).then(t => {
                const m = t.match(new RegExp(`^lv${num}=(.*)$`, 'm'));
                alert(m && m[1] ? m[1].trim() : "Nessun suggerimento configurato per questo livello.");
            });
        }

        function checkNextLevelPassword(targetLevelNum, targetUrl) {
            const userPassword = prompt(`Inserisci la password del Livello ${targetLevelNum} per continuare:`);
            if (userPassword === null) return;
            
            fetch('../passwords.txt').then(r => r.text()).then(text => {
                const match = text.match(new RegExp(`^lv${targetLevelNum}=(.*)$`, 'm'));
                if (match && match[1] && match[1].trim() === userPassword) {
		    localStorage.setItem('maxUnlockedLevel', targetLevelNum);
                    window.location.href = targetUrl;
                } else {
                    alert("Password errata! Controlla maiuscole e minuscole.");
                }
            }).catch(() => alert("Errore di rete durante la verifica della password."));
        }
    </script>
</body>
</html>
